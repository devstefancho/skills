<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{TITLE}}</title>
    {{FONT_PRELOADS}}
    <style>
      :root {
        {{DESIGN_TOKENS}}
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      img {
        max-width: 100%;
        display: block;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      {{BASE_STYLES}}

      {{MOTION_STYLES}}
    </style>
  </head>
  <body class="{{BODY_CLASS}}">
    {{BODY}}
  </body>
</html>
